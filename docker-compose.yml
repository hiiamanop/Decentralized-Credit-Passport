services:
  ai-service:
    build:
      context: ./ai-service
    env_file:
      - .env.docker
    environment:
      - PORT=5001
    ports:
      - "${AI_HOST_PORT:-5001}:5001"
    volumes:
      - ./ai-service/models:/app/models:ro
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:5001/').read()"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    env_file:
      - .env.docker
    environment:
      - NEAR_NETWORK=testnet
      - NEAR_RPC_URL=https://rpc.testnet.fastnear.com
      - AI_SERVICE_URL=http://ai-service:5001
      - PORT=3000
    ports:
      - "${BACKEND_HOST_PORT:-3000}:3000"
    depends_on:
      ai-service:
        condition: service_healthy

  gateway-demo:
    image: node:20-alpine
    profiles: ["demo"]
    working_dir: /demo
    env_file:
      - .env.docker
    environment:
      - BASE_URL=http://backend:3000
      - SOURCE_SECRET_QRIS=${SOURCE_SECRET_QRIS:-dev_secret}
      - SOURCE_SECRET_MARKETPLACE=${SOURCE_SECRET_MARKETPLACE:-dev_secret}
      - SOURCE_SECRET_EWALLET=${SOURCE_SECRET_EWALLET:-dev_secret}
      - SOURCE_SECRET_BANK=${SOURCE_SECRET_BANK:-dev_secret}
    volumes:
      - ./scripts:/demo/scripts:ro
      - ./backend/testdata:/demo/testdata:ro
    depends_on:
      - backend
    command: ["node", "scripts/gateway-demo.mjs"]
