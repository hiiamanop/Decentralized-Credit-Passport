services:
  ai-service:
    build:
      context: ./ai-service
    environment:
      - PORT=5001
    ports:
      - "${AI_HOST_PORT:-5001}:5001"
    volumes:
      - ./ai-service/models:/app/models:ro
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:5001/').read()"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    environment:
      - NEAR_NETWORK=testnet
      - NEAR_RPC_URL=https://rpc.testnet.fastnear.com
      - CONTRACT_ID=${CONTRACT_ID}
      - ORACLE_ACCOUNT_ID=${ORACLE_ACCOUNT_ID}
      - ORACLE_PRIVATE_KEY=${ORACLE_PRIVATE_KEY}
      - AI_SERVICE_URL=http://ai-service:5001
      - PORT=3000
    ports:
      - "${BACKEND_HOST_PORT:-3000}:3000"
    depends_on:
      ai-service:
        condition: service_healthy
